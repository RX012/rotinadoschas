    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; 
            padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 10px; display: flex; justify-content: center; }
        .logo-container img { max-width: 130px; height: auto; }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--gray-progress);
            border-radius: 20px; 
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; background-color: var(--green-btn);
            width: 45%; 
            border-radius: 20px;
            transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h2 { color: var(--text-dark); font-size: 22px; font-weight: 900; margin: 0 0 10px 0; line-height: 1.2; }

        .testimonial-text { 
            font-size: 16px; 
            font-weight: 500; 
            line-height: 1.5; 
            color: var(--text-dark);
            margin: 0 0 15px 0;
            padding: 0 10px;
        }

        .result-image-container { 
            width: 100%; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .result-image-container img { width: 100%; display: block; height: auto; }

        .btn-continuar {
            background-color: var(--green-btn);
            color: white;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0px 0px var(--green-shadow);
            position: relative;
            overflow: hidden;
            animation: pulse-button 2s infinite ease-in-out;
            transition: all 0.1s ease;
        }

        .btn-continuar::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }

        @keyframes pulse-button {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @keyframes shine {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .btn-continuar:active {
            transform: translateY(3px) scale(0.98);
            box-shadow: 0 1px 0px 0px var(--green-shadow);
        }
    </style>
</head>
<body onload="iniciarAnimacao()">

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="barra"></div>
    </div>

    <h2>Veja o Resultado dos Chás Bariátricos na Vida da Mariana</h2>
    
    <p class="testimonial-text">
        Com dificuldades para emagrecer e muita ansiedade, Mariana incluiu os chás bariátricos em sua rotina noturna. Em apenas três semanas, perdeu <strong>9 kg</strong>, melhorando sua autoestima e vida.
    </p>

    <div class="result-image-container">
        <img src="mariana.jpg" alt="Resultado Mariana">
    </div>

    <button class="btn-continuar" onclick="proxima()">Continuar</button>
</div>

<script>
    function iniciarAnimacao() {
        setTimeout(() => {
            document.getElementById("barra").style.width = "50%";
        }, 300);
    }

    function proxima() {
        // Dispara o evento de Lead ao avançar para a próxima etapa
        fbq('track', 'Lead', {
            content_name: 'Visualizacao_Resultado_Mariana'
        });

        setTimeout(function() {
            window.location.href = "pagina9.html"; 
        }, 200);
    }
</script>

</body>

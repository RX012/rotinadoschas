    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --green-btn: #1b8a43; --green-dark: #125e2e; --input-border: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 414px; padding: 20px; text-align: center; }
        header { margin-top: 20px; margin-bottom: 50px; }
        .logo { width: 120px; }
        h2 { font-size: 21px; font-weight: 800; line-height: 1.4; margin-bottom: 40px; color: #000; padding: 0 15px; }
        .input-group { position: relative; width: 100%; margin-bottom: 25px; }
        .input-field { width: 100%; padding: 20px 20px 20px 55px; font-size: 17px; border: 2px solid var(--input-border); border-radius: 12px; outline: none; color: #333; background: #fff; }
        .input-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 22px; opacity: 0.8; }
        .continue-btn { background-color: var(--green-btn); color: #ffffff; width: 100%; padding: 22px; font-size: 20px; font-weight: 800; border: none; border-radius: 15px; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 0 var(--green-dark); transition: all 0.1s ease; animation: pulseEffect 2s infinite; }
        .continue-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--green-dark); }
        @keyframes pulseEffect { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
<div class="container">
    <header><img src="logo.png" class="logo"></header>
    <h2>Digite seu e-mail para receber seu plano personalizado</h2>
    <form id="emailForm" onsubmit="redirecionar(event)">
        <div class="input-group">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z'/%3E%3C/svg%3E" class="input-icon">
            <input type="email" class="input-field" placeholder="seuemail@exemplo.com" required>
        </div>
        <button type="submit" class="continue-btn">Continuar</button>
    </form>
</div>
<script>
    function redirecionar(event) { 
        event.preventDefault();
        // Rastreamento de Lead ao submeter o e-mail
        fbq('track', 'Lead', {
            content_name: 'Captura_Email'
        });
        window.location.href = "pagina31.html"; 
    }
</script>
</body>
</html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 20px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: var(--gray-progress);
            border-radius: 20px; margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; 
            background-color: var(--green-btn);
            width: 85%; 
            border-radius: 20px;
        }

        h2 { color: var(--text-dark); font-size: 22px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
        
        .sub-titulo { 
            font-size: 14px; 
            color: var(--text-dark); 
            margin-bottom: 30px; 
            display: block; 
            text-decoration: underline;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-item {
            background: #fff;
            border: 1.5px solid var(--green-border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: 0.1s;
        }

        .option-item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px 0px var(--green-border);
        }

        .clock-icon {
            width: 45px;
            height: 45px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo Rotina dos Chás">
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <h2>Quantas horas de sono você costuma ter por noite?</h2>
    
    <span class="sub-titulo">
        A qualidade do seu sono impacta diretamente no seu emagrecimento!
    </span>

    <div class="options-list">
        <div class="option-item" onclick="proxima('menos_5')">
            <img src="https://cdn-icons-png.flaticon.com/512/2784/2784459.png" class="clock-icon" alt="Relógio">
            <span class="option-text">Menos de 5 horas</span>
        </div>

        <div class="option-item" onclick="proxima('5_a_7')">
            <img src="https://cdn-icons-png.flaticon.com/512/2784/2784459.png" class="clock-icon" alt="Relógio">
            <span class="option-text">Entre 5 e 7 horas</span>
        </div>

        <div class="option-item" onclick="proxima('7_a_9')">
            <img src="https://cdn-icons-png.flaticon.com/512/2784/2784459.png" class="clock-icon" alt="Relógio">
            <span class="option-text">Entre 7 e 9 horas</span>
        </div>

        <div class="option-item" onclick="proxima('mais_9')">
            <img src="https://cdn-icons-png.flaticon.com/512/2784/2784459.png" class="clock-icon" alt="Relógio">
            <span class="option-text">Mais de 9 horas</span>
        </div>
    </div>
</div>

<script>
    function proxima(valor) {
        localStorage.setItem("usuario_horas_sono", valor);
        
        // Dispara o evento de Lead capturando as horas de sono
        fbq('track', 'Lead', {
            content_name: 'Captura_Horas_Sono',
            custom_data: { horas_sono: valor }
        });
        
        window.location.href = "pagina24.html";
    }
</script>

</body>
</html>

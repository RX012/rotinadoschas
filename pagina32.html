    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --orange-border: #f39c12;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #fff;
        }

        .main-container {
            max-width: 400px; width: 90%;
            text-align: center;
        }

        .status-box {
            border: 2.5px dashed #f5a623;
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-bariatrico {
            width: 180px;
            height: auto;
            margin-bottom: 25px;
        }

        h2 {
            color: var(--text-dark);
            font-size: 26px;
            font-weight: 900;
            margin: 0;
            line-height: 1.2;
        }

        .progress-wrapper {
            width: 100%;
            background-color: #f0f0f0;
            border-radius: 30px;
            height: 30px;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .progress-fill {
            height: 100%;
            width: 0%; 
            background-color: var(--green-btn);
            border-radius: 30px;
            transition: width 0.05s linear;
        }

        .percentage-text {
            position: absolute;
            width: 100%;
            top: 0; left: 0;
            text-align: center;
            line-height: 30px;
            font-weight: 900;
            font-size: 16px;
            z-index: 5;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <div class="status-box">
        <img src="logo-bariatrico.png" alt="Rotina dos Chás Bariátricos" class="logo-bariatrico">
        <h2>Estamos analisando suas respostas...</h2>
    </div>

    <div class="progress-wrapper">
        <div class="percentage-text" id="perc">0%</div>
        <div class="progress-fill" id="bar"></div>
    </div>

</div>

<script>
    const bar = document.getElementById('bar');
    const perc = document.getElementById('perc');
    let count = 0;
    
    const duration = 4000; 
    const stepTime = duration / 100;

    const interval = setInterval(() => {
        count++;
        bar.style.width = count + '%';
        perc.innerHTML = count + '%';

        if (count > 52) {
            perc.style.color = "#ffffff";
        }

        if (count >= 100) {
            clearInterval(interval);
            
            // Dispara evento de conclusão da última análise
            fbq('track', 'Lead', {
                content_name: 'Analise_Final_Concluida'
            });

            setTimeout(() => {
                window.location.href = "pagina33.html"; 
            }, 800);
        }
    }, stepTime);
</script>

</body>
</html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --text-dark: #1a1a1a;
            --gray-bg: #fcfcfc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
            padding-top: 40px; 
        }

        .logo-container { width: 100%; margin-bottom: 40px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        h2 { color: var(--text-dark); font-size: 24px; font-weight: 900; margin-bottom: 12px; }
        
        .sub-texto { 
            font-size: 15px; 
            color: var(--text-dark); 
            text-decoration: underline; 
            margin-bottom: 40px;
            display: block;
            line-height: 1.4;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .icon-user {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #1a1a1a;
            width: 24px;
            height: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 22px 15px 22px 55px;
            font-size: 17px;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            background-color: var(--gray-bg);
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        .btn-grande {
            background-color: var(--green-btn);
            color: white;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 22px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0px 0px var(--green-shadow);
            margin-bottom: 40px;
            transition: all 0.1s;
        }

        .btn-grande:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px 0px var(--green-shadow);
        }

        .info-card {
            background-color: #fff;
            border: 1px solid #f2f2f2;
            border-radius: 18px;
            padding: 25px 20px;
            display: flex;
            align-items: center;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .icon-check {
            margin-right: 15px;
            flex-shrink: 0;
            color: #1a1a1a;
        }

        .info-card p {
            margin: 0;
            font-size: 16px;
            line-height: 1.4;
            color: var(--text-dark);
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <h2>Qual é a sua altura?</h2>
    
    <span class="sub-texto">
        Sua altura também influencia no metabolismo!
    </span>

    <div class="input-wrapper">
        <svg class="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <input type="text" id="alturaInput" placeholder="Digite a sua altura aqui" inputmode="decimal">
    </div>

    <button class="btn-grande" onclick="salvarEProsseguir()">
        Continuar
    </button>

    <div class="info-card">
        <svg class="icon-check" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <p>Isso nos ajudará a calcular a quantidade exata dos Chás Bariátricos para seu corpo.</p>
    </div>
</div>

<script>
    function salvarEProsseguir() {
        const altura = document.getElementById('alturaInput').value;
        
        if(altura.trim() === "") {
            alert("Por favor, informe sua altura.");
            return;
        }

        // Salva a altura na memória
        localStorage.setItem("usuario_altura", altura);
        
        // Dispara evento de Lead capturando a altura
        fbq('track', 'Lead', {
            content_name: 'Captura_Altura',
            custom_data: { altura: altura }
        });
        
        window.location.href = "pagina21.html";
    }
</script>

</body>
</html>

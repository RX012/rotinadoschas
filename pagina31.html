    <style>
        :root {
            --green-btn: #1b8a43;
            --green-dark: #125e2e;
            --shadow-3d: 0 6px 0 var(--green-dark);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { 
            width: 100%; max-width: 414px; 
            padding: 20px; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { margin-top: 30px; margin-bottom: 60px; }
        .logo { width: 120px; }

        .message-box {
            padding: 0 10px;
            margin-bottom: 40px;
        }

        h2 { 
            font-size: 22px; 
            font-weight: 800; 
            line-height: 1.4; 
            color: #000;
            margin: 0;
        }

        .continue-btn {
            background-color: var(--green-btn);
            color: #ffffff;
            width: 90%;
            padding: 22px;
            font-size: 20px;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: var(--shadow-3d);
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .continue-btn:active {
            transform: translateY(4px) scale(0.98);
            box-shadow: 0 2px 0 var(--green-dark);
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<div class="container">
    <header>
        <img src="logo.png" class="logo" alt="Rotina dos Chás">
    </header>

    <div class="message-box">

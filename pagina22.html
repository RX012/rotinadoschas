    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 20px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: var(--gray-progress);
            border-radius: 20px; margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; 
            background-color: var(--green-btn);
            width: 75%;
            border-radius: 20px;
        }

        h2 { color: var(--text-dark); font-size: 22px; font-weight: 900; margin-bottom: 10px; }
        .sub-titulo { font-size: 14px; color: #444; margin-bottom: 25px; display: block; }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-item {
            background: #fff;
            border: 1.5px solid var(--green-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: 0.1s;
        }

        .option-item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px 0px var(--green-border);
        }

        .emoji-icon {
            font-size: 28px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <h2>Como é a sua rotina diária?</h2>
    <span class="sub-titulo">Vamos personalizar seu plano conforme sua rotina diária</span>

    <div class="options-list">
        <div class="option-item" onclick="proxima('agitada')">
            <span class="emoji-icon">🤯</span>
            <span class="option-text">Trabalho fora e tenho uma rotina agitada</span>
        </div>

        <div class="option-item" onclick="proxima('flexivel')">
            <span class="emoji-icon">🫣</span>
            <span class="option-text">Trabalho em casa e tenho uma rotina flexível</span>
        </div>

        <div class="option-item" onclick="proxima('familia')">
            <span class="emoji-icon">👨‍👩‍👧</span>
            <span class="option-text">Em casa cuidando da família</span>
        </div>

        <div class="option-item" onclick="proxima('outro')">
            <span class="emoji-icon">😶</span>
            <span class="option-text">Outro</span>
        </div>
    </div>
</div>

<script>
    function proxima(valor) {
        localStorage.setItem("usuario_rotina", valor);
        
        // Dispara evento de Lead com a opção de rotina escolhida
        fbq('track', 'Lead', {
            content_name: 'Captura_Rotina_Diaria',
            custom_data: { rotina: valor }
        });

        window.location.href = "pagina23.html";
    }
</script>

</body>
</html>

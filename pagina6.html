    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --green-bg-light: #f4faf6;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; 
            width: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            max-width: 130px;
            height: auto;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--gray-progress);
            border-radius: 20px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--green-btn);
            width: 35%;
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        h2 {
            color: var(--text-dark);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.3;
            padding: 0 10px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: #444;
            margin-bottom: 25px;
            display: block;
        }

        .age-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .age-card {
            background-color: #fff;
            border: 2px solid var(--green-border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .age-card:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px 0px var(--green-border);
        }

        .age-card img {
            width: 100%;
            height: auto;
            display: block;
            padding: 10px 10px 0 10px;
            box-sizing: border-box;
        }

        .age-label {
            padding: 15px 0;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-dark);
        }
    </style>
</head>
<body onload="avancarProgresso()">

<div class="main-container">
    
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="barra"></div>
    </div>

    <h2>Vamos criar um Plano Personalizado de Emagrecimento com Chás Bariátricos, focado nas suas necessidades.</h2>
    <span class="subtitle">Selecione sua idade abaixo:</span>

    <div class="age-grid">
        <div class="age-card" onclick="proxima('18 a 26')">
            <img src="idade1.jpg" alt="18 a 26">
            <div class="age-label">18 a 26</div>
        </div>

        <div class="age-card" onclick="proxima('27 a 38')">
            <img src="idade2.jpg" alt="27 a 38">
            <div class="age-label">27 a 38</div>
        </div>

        <div class="age-card" onclick="proxima('39 a 50')">
            <img src="idade3.jpg" alt="39 a 50">
            <div class="age-label">39 a 50</div>
        </div>

        <div class="age-card" onclick="proxima('46+')">
            <img src="idade4.jpg" alt="46+">
            <div class="age-label">46+</div>
        </div>
    </div>

</div>

<script>
    function avancarProgresso() {
        setTimeout(() => {
            document.getElementById("barra").style.width = "40%";
        }, 300);
    }

    function proxima(faixaEtaria) {
        // Dispara o evento de Lead com a idade selecionada
        fbq('track', 'Lead', {
            content_name: 'Selecao_Idade',
            value: faixaEtaria
        });

        setTimeout(function() {
            window.location.href = "pagina7.html"; 
        }, 200);
    }
</script>

</body>
</html>

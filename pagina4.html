<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --green-bg-light: #f4faf6;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; 
            width: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            max-width: 130px;
            height: auto;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--gray-progress);
            border-radius: 20px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--green-btn);
            width: 25%;
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        h2 {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: #666;
            margin-bottom: 30px;
            display: block;
        }

        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .gender-card {
            background-color: #fff;
            border: 2px solid var(--green-border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: all 0.1s ease;
        }

        .gender-card:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px 0px var(--green-border);
        }

        .gender-card img {
            width: 100%;
            display: block;
            height: auto;
        }

        .gender-label {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #26a855;
            color: white;
            font-weight: 900;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 18px;
            width: 80%;
        }

        .info-box {
            background-color: var(--green-bg-light);
            border: 1px solid var(--green-border);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            display: flex;
            gap: 15px;
        }

        .info-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .info-content h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.2;
        }

        .info-content p {
            margin: 0;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }
    </style>
</head>
<body onload="avancarProgresso()">

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="barra"></div>
    </div>

    <h2>Qual seu Sexo?</h2>
    <span class="subtitle">Selecione abaixo</span>

    <div class="gender-grid">
        <div class="gender-card" onclick="irParaPagina5('Mulher')">
            <img src="mulher.jpg" alt="Mulher">
            <div class="gender-label">MULHER</div>
        </div>

        <div class="gender-card" onclick="irParaPagina5('Homem')">
            <img src="homem.jpg" alt="Homem">
            <div class="gender-label">HOMEM</div>
        </div>
    </div>

    <div class="info-box">
        <div class="info-icon">📋</div>
        <div class="info-content">
            <h3>As informações são para fazer ajustes em seu plano exclusivo e personalizado.</h3>
            <p>O sexo biológico é um fator que afeta a sua TMB (taxa metabólica), que determina quantas calorias você queima por dia.</p>
        </div>
    </div>
</div>

<script>
    function avancarProgresso() {
        setTimeout(() => {
            document.getElementById("barra").style.width = "30%";
        }, 300);
    }

    function irParaPagina5(genero) {
        // Dispara o evento de Lead identificando o sexo selecionado
        fbq('track', 'Lead', {
            content_name: 'Selecao_Sexo',
            value: genero
        });

        // Redireciona após o disparo
        setTimeout(function() {
            window.location.href = "pagina5.html"; 
        }, 150);
    }
</script>

</body>
</html>

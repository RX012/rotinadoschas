    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --green-bg-light: #f4faf6;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; 
            width: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            max-width: 130px;
            height: auto;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--gray-progress);
            border-radius: 20px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--green-btn);
            width: 30%;
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        h2 {
            color: var(--text-dark);
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .highlight-green {
            color: #26a855;
            display: block;
            margin-bottom: 30px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-item {
            background-color: var(--green-bg-light);
            border: 2px solid var(--green-border);
            border-radius: 15px;
            padding: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: all 0.1s ease;
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .option-item:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px 0px var(--green-border);
            background-color: #e8f5ed;
        }
    </style>
</head>
<body onload="avancarProgresso()">

<div class="main-container">
    
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="barra"></div>
    </div>

    <h2>Em qual área do seu corpo</h2>
    <h2 class="highlight-green">você gostaria de reduzir mais gordura?</h2>

    <div class="options-list">
        <div class="option-item" onclick="proxima('Região dos Culotes')">Região dos Culotes</div>
        <div class="option-item" onclick="proxima('Região das Coxas')">Região das Coxas</div>
        <div class="option-item" onclick="proxima('Região do Abdômen')">Região do Abdômen (barriga)</div>
        <div class="option-item" onclick="proxima('Região dos Glúteos')">Região dos Glúteos</div>
        <div class="option-item" onclick="proxima('Região dos Braços')">Região dos Braços</div>
    </div>

</div>

<script>
    function avancarProgresso() {
        setTimeout(() => {
            document.getElementById("barra").style.width = "35%";
        }, 300);
    }

    function proxima(area) {
        // Dispara o evento de Lead com a área selecionada
        fbq('track', 'Lead', {
            content_name: 'Selecao_Area_Corpo',
            value: area
        });

        setTimeout(function() {
            window.location.href = "pagina6.html"; 
        }, 150);
    }
</script>

</body>
</html>

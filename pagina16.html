    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
            --red-text: #e63946;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 10px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: var(--gray-progress);
            border-radius: 20px; margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; background-color: var(--green-btn);
            width: 90%; 
            border-radius: 20px;
            animation: recuoProgresso 3s forwards ease-in-out;
        }

        @keyframes recuoProgresso {
            0% { width: 90%; }
            60% { width: 95%; } 
            100% { width: 85%; }
        }

        h2 { color: var(--text-dark); font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        
        .destaque-link { 
            font-size: 15px; 
            color: var(--text-dark); 
            text-decoration: underline; 
            line-height: 1.4;
            display: block;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .titulo-red {
            color: var(--red-text);
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .ciclo-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .ciclo-container img {
            width: 100%;
            max-width: 350px;
            height: auto;
        }

        .btn-grande {
            background-color: var(--green-btn);
            color: white;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 22px;
            font-size: 19px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 0px 0px var(--green-shadow);
            animation: pulsando 2s infinite ease-in-out;
        }

        @keyframes pulsando {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <h2>Te entendemos!</h2>
    
    <span class="destaque-link">
        Os Chás Bariátricos agem enquanto você dorme, queimando gordura de forma acelerada!
    </span>

    <div class="titulo-red">
        COMO FUNCIONA O CHÁ PRONTO
    </div>

    <div class="ciclo-container">
        <img src="ciclo_funcionamento.png" alt="Ciclo de queima de gordura">
    </div>

    <button class="btn-grande" onclick="window.location.href='pagina17.html'">
        Continuar
    </button>
</div>

</body>

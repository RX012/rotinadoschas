    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-color: #fff;
            display: flex; justify-content: center;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 10px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: var(--gray-progress);
            border-radius: 20px; margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%; background-color: var(--green-btn);
            width: 92%;
            border-radius: 20px;
            transition: width 2s ease-in-out;
        }

        h2 { color: var(--text-dark); font-size: 22px; font-weight: 900; margin-bottom: 15px; line-height: 1.2; }
        .sub-texto { font-size: 15px; color: #444; line-height: 1.5; margin-bottom: 25px; padding: 0 10px; }

        .slide-area {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }

        .carousel-view {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-out;
        }

        .carousel-item {
            min-width: 100%;
        }

        .carousel-item img {
            width: 100%;
            display: block;
        }

        .slide-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .nav-prev { left: 10px; }
        .nav-prev::after {
            content: ''; width: 10px; height: 10px;
            border-top: 3px solid #fff; border-left: 3px solid #fff;
            transform: rotate(-45deg); margin-left: 4px;
        }

        .nav-next { right: 10px; }
        .nav-next::after {
            content: ''; width: 10px; height: 10px;
            border-top: 3px solid #fff; border-right: 3px solid #fff;
            transform: rotate(45deg); margin-right: 4px;
        }

        .dots-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .dot {
            width: 10px; height: 10px;
            background-color: #e0e0e0;
            border-radius: 50%;
            transition: 0.3s;
        }

        .dot.active { background-color: #b0b0b0; transform: scale(1.2); }

        .btn-grande {
            background-color: var(--green-btn);
            color: white;
            border: none;
            border-radius: 15px;
            width: 100%;
            padding: 22px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 0px 0px var(--green-shadow);
            animation: pulsando 2s infinite ease-in-out;
        }

        @keyframes pulsando {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <h2>Suas respostas são parecidas com as delas...</h2>
    <p class="sub-texto">
        Isso significa que você também pode se beneficiar da nossa <strong>Rotina de Chás Bariátricos</strong>, assim como milhares de mulheres que já transformaram suas vidas.
    </p>

    <div class="slide-area">
        <div class="carousel-view">
            <div class="carousel-track" id="track">
                <div class="carousel-item"><img src="depoimento1.jpg"></div>
                <div class="carousel-item"><img src="depoimento2.jpg"></div>
                <div class="carousel-item"><img src="depoimento3.jpg"></div>
            </div>
        </div>

        <div class="slide-nav nav-prev" onclick="mudarSlide(-1)"></div>
        <div class="slide-nav nav-next" onclick="mudarSlide(1)"></div>
    </div>

    <div class="dots-container">
        <div class="dot active" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
    </div>

    <button class="btn-grande" onclick="finalizarQuiz()">
        Também Quero Essa Transformação!
    </button>
</div>

<script>
    let slideAtual = 0;
    const totalDeSlides = 3;

    function mudarSlide(direcao) {
        slideAtual += direcao;
        if (slideAtual >= totalDeSlides) slideAtual = 0;
        if (slideAtual < 0) slideAtual = totalDeSlides - 1;
        
        document.getElementById('track').style.transform = `translateX(-${slideAtual * 100}%)`;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById('dot' + slideAtual).classList.add('active');
    }

    function finalizarQuiz() {
        // Dispara o evento de Lead antes de redirecionar
        fbq('track', 'Lead', {
            content_name: 'Conversao_Final_Quiz'
        });

        window.location.href = 'pagina15.html';
    }
</script>

</body>
</html>

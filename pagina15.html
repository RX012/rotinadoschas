    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-btn: #1b8a43;
            --green-shadow: #125e2e;
            --green-border: #2d8a4e;
            --text-dark: #1a1a1a;
            --gray-progress: #f3f3f3;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            background-color: #fff;
        }

        .main-container {
            max-width: 450px; width: 100%;
            text-align: center; padding: 15px;
            box-sizing: border-box;
        }

        .logo-container { width: 100%; margin-bottom: 10px; display: flex; justify-content: center; }
        .logo-container img { max-width: 110px; height: auto; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: var(--gray-progress);
            border-radius: 20px; margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; background-color: var(--green-btn);
            width: 85%;
            border-radius: 20px;
            animation: progressoEfeito 2.5s forwards ease-in-out;
        }

        @keyframes progressoEfeito {
            0% { width: 85%; }
            70% { width: 92%; }
            100% { width: 90%; }
        }

        h2 { color: var(--text-dark); font-size: 22px; font-weight: 900; margin-bottom: 30px; }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .option-card {
            background-color: #fff;
            border: 2px solid var(--green-border);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            text-align: left;
            position: relative;
            box-shadow: 0 4px 0px 0px var(--green-border);
            transition: all 0.1s ease;
        }

        .option-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px 0px var(--green-border);
        }

        .emoji-box {
            font-size: 40px;
            margin-right: 20px;
            min-width: 50px;
            display: flex;
            justify-content: center;
        }

        .text-content b {
            display: block;
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 2px;
            font-weight: 800;
        }

        .text-content span {
            font-size: 13px;
            color: #555;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <img src="logo.png" alt="Logotipo">
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <h2>O que te impede de emagrecer?</h2>

    <div class="options-list">
        <div class="option-card" onclick="proxima('Falta de tempo')">
            <div class="emoji-box">⏰</div>
            <div class="text-content">
                <b>Falta de tempo</b>
                <span>Rotina agitada.</span>
            </div>
        </div>

        <div class="option-card" onclick="proxima('Autocontrole')">
            <div class="emoji-box">😬</div>
            <div class="text-content">
                <b>Autocontrole</b>
                <span>Dificuldade em resistir a tentações alimentares.</span>
            </div>
        </div>

        <div class="option-card" onclick="proxima('Financeiro')">
            <div class="emoji-box">💸</div>
            <div class="text-content">
                <b>Financeiro</b>
                <span>Achar opções saudáveis mais caras do que alimentos processados.</span>
            </div>
        </div>
    </div>
</div>

<script>
    function proxima(valor) {
        // Salva a escolha na memória
        localStorage.setItem("usuario_obstaculo", valor);
        
        // Dispara evento de Lead com o obstáculo selecionado
        fbq('track', 'Lead', {
            content_name: 'Selecao_Obstaculo',
            value: valor
        });
        
        // Pequeno atraso para o usuário sentir o clique 3D antes de mudar de página
        setTimeout(() => {
            window.location.href = "pagina16.html";
        }, 200);
    }
</script>

</body>
</html>
